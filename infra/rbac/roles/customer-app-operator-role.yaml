apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: customer-app-operator
rules:
  # Nur Deployments erstellen und verwalten
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Services für eigene Apps
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Logs lesen für eigene Pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  # Ingress (optional, nur lesen)
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  # NICHT erlaubt:
  # - secrets lesen
  # - exec in Container
  # - ConfigMaps mit Credentials
  # - Zugriff auf andere Namespaces
  # - Cluster-Ressourcen
