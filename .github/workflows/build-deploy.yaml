name: Build and Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'apps/nginx/**'
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}
  REGISTRY: ghcr.io
  DEPLOYMENT_NS: default

jobs:
  # ============================================
  # Job 1: Build und Vulnerability Scan
  # ============================================
  build-and-scan:
    name: Build & Security Scan
    runs-on: ubuntu-latest
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      scan-result: ${{ steps.trivy.outputs.result }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/nginx
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -----------------------------------------
      # Trivy Vulnerability Scan
      # -----------------------------------------
      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'  # Fail if CRITICALs found
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Trivy Vulnerability Report
        if: always()
        run: |
          echo "=== Trivy Scan Result ==="
          echo "Exit code: ${{ steps.trivy.outputs.result }}"
          echo ""
          echo "If blocked: Fix vulnerabilities before deploying."

  # ============================================
  # Job 2: Push Image (nur wenn Scan OK)
  # ============================================
  push-image:
    name: Push Image
    runs-on: ubuntu-latest
    needs: build-and-scan
    
    # Nur pushen wenn Scan keine CRITICALs hatte
    if: needs.build-and-scan.outputs.scan-result != '1'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: apps/nginx
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output Image Tag
        run: |
          echo "Image pushed: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"

  # ============================================
  # Job 3: Flux Sync (Update Deployment)
  # ============================================
  flux-sync:
    name: Update Flux Deployment
    runs-on: ubuntu-latest
    needs: push-image
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Flux
        uses: fluxcd/flux2/actions/setup@v2

      - name: Reconcile Flux
        run: |
          flux reconcile source git flux-system
          flux reconcile kustomization apps

      - name: Create deployment update commit
        run: |
          # Update image tag in deployment
          sed -i 's|image: .*|image: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}|' apps/nginx/deployment.yaml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add apps/nginx/deployment.yaml
          git diff --cached --stat
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: Update nginx image to ${{ github.sha }}"
            git push
          fi

      - name: Flux Sync
        run: |
          flux reconcile kustomization apps --with-source
          kubectl rollout status deployment/nginx -n ${{ env.DEPLOYMENT_NS }} --timeout=300s
